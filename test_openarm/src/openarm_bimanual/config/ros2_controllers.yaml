# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    openarm_left:
      type: joint_trajectory_controller/JointTrajectoryController


    controller_hand_left:
      type: joint_trajectory_controller/JointTrajectoryController


    controller_right_arm:
      type: joint_trajectory_controller/JointTrajectoryController


    controller_right_hand:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

openarm_left:
  ros__parameters:
    joints:
      []
    command_interfaces:
      []
    state_interfaces:
      []
controller_hand_left:
  ros__parameters:
    joints:
      []
    command_interfaces:
      []
    state_interfaces:
      []
controller_right_arm:
  ros__parameters:
    joints:
      - openarm_right_joint1
      - openarm_right_joint2
      - openarm_right_joint3
      - openarm_right_joint4
      - openarm_right_joint5
      - openarm_right_joint6
      - openarm_right_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
controller_right_hand:
  ros__parameters:
    joints:
      - openarm_right_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity