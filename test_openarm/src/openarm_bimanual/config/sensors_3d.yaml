sensors:
  - default_sensor
default_sensor:
  filtered_cloud_topic: filtered_cloud
  max_range: 5
  max_update_rate: 1.0
  padding_offset: 0.1
  padding_scale: 1
  point_cloud_topic: head_cam_image/depth_registered/pointcloud
  point_subsample: 1
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater