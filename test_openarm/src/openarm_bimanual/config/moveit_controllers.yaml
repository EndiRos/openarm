# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - ropenarm_ight_arm_controller
    - openarm_left_arm_controller
    - openarm_left_hand_controller
    - openarm_right_hand_controller

  ropenarm_ight_arm_controller:
    type: FollowJointTrajectory
    joints:
      []
    action_ns: follow_joint_trajectory
    default: true
  openarm_left_arm_controller:
    type: FollowJointTrajectory
    joints:
      - openarm_left_joint1
      - openarm_left_joint2
      - openarm_left_joint3
      - openarm_left_joint4
      - openarm_left_joint5
      - openarm_left_joint6
      - openarm_left_joint7
    action_ns: follow_joint_trajectory
    default: true
  openarm_left_hand_controller:
    type: GripperCommand
    joints:
      []
    action_ns: gripper_cmd
    default: true
  openarm_right_hand_controller:
    type: GripperCommand
    joints:
      []
    action_ns: gripper_cmd
    default: true